
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0}
.top-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.search{padding:5px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);font-size:13px;width:160px;background:var(--color-background-primary);color:var(--color-text-primary)}
.stats-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.stat{font-size:12px;color:var(--color-text-secondary)}
.pbar{flex:1;height:3px;background:var(--color-background-secondary);border-radius:2px;min-width:80px}
.pfill{height:100%;background:#1D9E75;border-radius:2px;transition:width 0.3s}
.topics{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:16px}
.topic-btn{padding:8px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;text-align:left;transition:border-color 0.15s}
.topic-btn:hover{border-color:var(--color-border-secondary)}
.topic-btn.active{border-color:transparent}
.topic-icon{font-size:16px;margin-bottom:3px}
.topic-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.topic-count{font-size:11px;color:var(--color-text-tertiary);margin-top:1px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px;cursor:pointer;min-height:88px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative;transition:border-color 0.15s}
.card:hover{border-color:var(--color-border-secondary)}
.card.flipped{background:var(--color-background-secondary)}
.card.flipped .front{display:none}
.card.flipped .back{display:flex}
.front,.back{display:flex;flex-direction:column;align-items:center;gap:2px;width:100%}
.back{display:none}
.hanzi{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.pinyin{font-size:11px;color:var(--color-text-secondary)}
.num{font-size:10px;color:var(--color-text-tertiary);position:absolute;top:5px;left:7px}
.meaning{font-size:12px;color:var(--color-text-primary);text-align:center;line-height:1.4}
.cat-dot{width:6px;height:6px;border-radius:50%;margin-top:1px;flex-shrink:0}
.page-ctrl{display:flex;align-items:center;gap:6px;margin-top:12px;justify-content:center;flex-wrap:wrap}
.page-btn{padding:4px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);font-size:12px;cursor:pointer;background:transparent;color:var(--color-text-secondary)}
.page-btn:disabled{opacity:0.35;cursor:default}
.page-btn.on{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.pinfo{font-size:12px;color:var(--color-text-secondary)}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid var(--color-border-tertiary)}
.section-title{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.section-badge{font-size:11px;padding:2px 8px;border-radius:10px}
</style>

<div class="wrap">
<div class="top-bar">

<div class="stats-row">

</div>
</div>

const PAGE=48;
let curTopic="all",search="",page=1,learned=new Set();

function getFiltered(){
  return vocab.filter(v=>{
    const mt=curTopic==="all"||v.t===curTopic;
    const q=search.toLowerCase();
    const ms=!q||v.h.includes(q)||v.p.toLowerCase().includes(q)||v.m.toLowerCase().includes(q);
    return mt&&ms;
  });
}

function buildTopics(){
  const g=document.getElementById("topics-grid");
  g.innerHTML=TOPICS.map(t=>{
    const cnt=t.id==="all"?vocab.length:vocab.filter(v=>v.t===t.id).length;
    const isActive=curTopic===t.id;
    const style=isActive?`background:${t.bg};border-color:${t.color}`:"";
    return `<div class="topic-btn${isActive?" active":""}" style="${style}" onclick="setTopic('${t.id}')">
      <div class="topic-icon">${t.icon}</div>
      <div class="topic-name" style="${isActive?`color:${t.tc}`:""}">${t.name}</div>
      <div class="topic-count">${cnt} คำ</div>
    </div>`;
  }).join("");
}

function updateProgress(){
  const lc=learned.size;
  document.getElementById("learned-stat").textContent=`จำได้ ${lc}/1200 คำ`;
  document.getElementById("pfill").style.width=Math.round(lc/1200*100)+"%";
  document.getElementById("pct").textContent=Math.round(lc/1200*100)+"%";
}

function render(){
  const filtered=getFiltered();
  const tp=TOPICS.find(t=>t.id===curTopic);
  document.getElementById("disp-stat").textContent=filtered.length+" คำ";

  const sh=document.getElementById("sec-header");
  if(curTopic!=="all"&&tp){
    sh.style.display="flex";
    document.getElementById("sec-title").textContent=tp.icon+" "+tp.name;
    const badge=document.getElementById("sec-badge");
    badge.textContent=filtered.length+" คำ";
    badge.style.background=tp.bg;
    badge.style.color=tp.tc;
  } else {
    sh.style.display="none";
  }

  const maxP=Math.ceil(filtered.length/PAGE)||1;
  if(page>maxP)page=1;
  const slice=filtered.slice((page-1)*PAGE,page*PAGE);

  document.getElementById("card-grid").innerHTML=slice.map(v=>{
    const tp2=TOPICS.find(t=>t.id===v.t);
    const col=tp2?tp2.color:"#888";
    const fl=learned.has(v.n);
    return `<div class="card${fl?" flipped":""}" onclick="flip(${v.n})" data-n="${v.n}">
      <span class="num">#${v.n}</span>
      <div class="front">
        <span class="hanzi">${v.h}</span>
        <span class="pinyin">${v.p}</span>
        <div style="display:flex;align-items:center;gap:4px;margin-top:2px">
          <span class="cat-dot" style="background:${col}"></span>
          <span style="font-size:10px;color:var(--color-text-tertiary)">${tp2?tp2.name:""}</span>
        </div>
      </div>
      <div class="back">
        <span class="hanzi" style="font-size:16px">${v.h}</span>
        <span class="meaning">${v.m}</span>
      </div>
    </div>`;
  }).join("");

  const pc=document.getElementById("page-ctrl");
  if(maxP<=1){pc.innerHTML="";return;}
  let b=`<button class="page-btn" onclick="goP(${page-1})" ${page<=1?"disabled":""}>◀</button>`;
  const s=Math.max(1,page-2),e=Math.min(maxP,page+2);
  if(s>1)b+=`<button class="page-btn" onclick="goP(1)">1</button>${s>2?'<span class="pinfo">…</span>':""}`;
  for(let i=s;i<=e;i++)b+=`<button class="page-btn${i===page?" on":""}" onclick="goP(${i})">${i}</button>`;
  if(e<maxP)b+=`${e<maxP-1?'<span class="pinfo">…</span>':""}<button class="page-btn" onclick="goP(${maxP})">${maxP}</button>`;
  b+=`<button class="page-btn" onclick="goP(${page+1})" ${page>=maxP?"disabled":""}>▶</button>`;
  b+=`<span class="pinfo">${page}/${maxP}</span>`;
  pc.innerHTML=b;
  updateProgress();
}

function flip(n){
  if(learned.has(n))learned.delete(n);else learned.add(n);
  const el=document.querySelector(`[data-n="${n}"]`);
  if(el)el.classList.toggle("flipped");
  updateProgress();
}

function setTopic(id){curTopic=id;page=1;buildTopics();render();}
function doSearch(v){search=v;page=1;render();}
function goP(p){
  const f=getFiltered();
  page=Math.max(1,Math.min(p,Math.ceil(f.length/PAGE)||1));
  render();
  document.querySelector(".wrap").scrollIntoView({behavior:"smooth"});
}

buildTopics();render();
</script>
